baseURL = "/Microbit-Robot-Rally/"
title = "Micro:bit Robot Rally"
theme = "hugo-theme-voidmain"
enableEmoji = true

# Mount course.yml as Hugo data so templates can read it
# directly via .Site.Data.course — no need to duplicate fields.
[[module.mounts]]
  source = "content"
  target = "content"
[[module.mounts]]
  source = "../course.yml"
  target = "data/course.yml"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[params]
  description = "A modular grades 6-8 robotics and engineering course where students program the BBC Micro:bit, Cutebot, and Joystick:bit in MakeCode to build robots and compete in robot-rally games."
  copyright = "The League of Amazing Programmers"
  license = "CC BY-NC 4.0"
  curriculum_version = "0.20260617.1"
  curik_version = "0.20260519.1"
  instructorGuide = true
